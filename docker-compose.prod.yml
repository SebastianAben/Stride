name: stride

services:
  app:
    container_name: stride-app
    image: ${APP_IMAGE:?APP_IMAGE is required}
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.production}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      stride_private:
      home_proxy:
        aliases:
          - stride-app

  migrate:
    image: node:22-alpine
    working_dir: /workspace
    env_file:
      - ${ENV_FILE:-.env.production}
    volumes:
      - .:/workspace
    depends_on:
      db:
        condition: service_healthy
    command: sh -lc "npm ci && npm run prisma:migrate:deploy"
    networks:
      - stride_private
    profiles:
      - tools

  db:
    container_name: stride-db
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stride}
      POSTGRES_USER: ${POSTGRES_USER:-stride}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stride} -d ${POSTGRES_DB:-stride}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stride_private

volumes:
  postgres_data:

networks:
  stride_private:
    driver: bridge
  home_proxy:
    external: true
